<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFFM - Mediathek</title>
    <style>
        /* Dein weißes Design bleibt */
        body {
            font-family: Arial, sans-serif;
            background-color: white;
            color: black;
            margin: 20px;
        }

        header {
            border-bottom: 1px solid #ccc;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        /* Tabelle schlicht und weiß */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f9f9f9;
        }

        /* Player-Fix: Einfach schwarz ohne Vorschaubild */
        video {
            width: 100%;
            max-width: 800px;
            background-color: black;
            display: block;
        }

        .section {
            margin-bottom: 30px;
        }

        /* Verkehr: Helle Karte */
        iframe {
            border: 1px solid #ccc;
            width: 100%;
            height: 400px;
        }
    </style>
</head>
<body>

    <header>
        <h1>NFFM Mediathek</h1>
    </header>

    <div class="section">
        <h2>Aktuelle Sendung</h2>
        <video controls>
            <source src="video.mp4" type="video/mp4">
            Ihr Browser unterstützt das Video-Tag nicht.
        </video>
    </div>

    <div class="section">
        <h2>Sendeplan</h2>
        <table>
            <thead>
                <tr>
                    <th>Wochentag</th>
                    <th>Sendung</th>
                    <th>Uhrzeit</th>
                </tr>
            </thead>
            <tbody>
                <tr><td>Montag</td><td>NFFM Aktuell</td><td>18:00</td></tr>
                <tr><td>Dienstag</td><td>Eco Talk</td><td>19:00</td></tr>
                <tr><td>Mittwoch</td><td>Wirtschaft</td><td>18:00</td></tr>
                <tr><td>Donnerstag</td><td>Live-Report</td><td>20:00</td></tr>
                <tr><td>Freitag</td><td>Wochenrückblick</td><td>17:00</td></tr>
                <tr><td>Samstag</td><td>Best Of</td><td>12:00</td></tr>
                <tr><td>Sonntag</td><td>Spielfilm</td><td>20:15</td></tr>
            </tbody>
        </table>
    </div>

    <div class="section">
        <h2>Verkehrsservice</h2>
        <iframe 
            src="https://www.openstreetmap.org/export/embed.html?bbox=6.90%2C49.18%2C7.10%2C49.28&layer=mapnik">
        </iframe>
    </div>

    <footer>
        <p>&copy; 2026 EcoStudios / NFFM</p>
    </footer>

</body>
</html>
